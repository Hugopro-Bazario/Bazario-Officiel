<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Panier Bazario Officiel." />
    <title>Panier | Bazario Officiel</title>
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        --bg: #f8fafc;
        --text: #0f172a;
        --muted: #475569;
        --card: #ffffff;
        --primary: #1d4ed8;
        --primary-dark: #1e40af;
        --border: #e2e8f0;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        width: min(980px, calc(100% - 2rem));
        margin: 0 auto;
      }
      header {
        border-bottom: 1px solid var(--border);
        background: #fff;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0;
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      .menu {
        display: flex;
        gap: 1rem;
        font-size: 0.95rem;
      }
      .menu a {
        color: var(--muted);
        text-decoration: none;
      }
      .menu a:hover {
        color: var(--text);
      }
      main {
        padding: 2.2rem 0 3rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        padding: 1.2rem;
      }
      h1 {
        margin: 0 0 0.6rem;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .actions {
        margin-top: 1rem;
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
      }
      .btn {
        text-decoration: none;
        border-radius: 0.6rem;
        padding: 0.65rem 0.9rem;
        font-weight: 600;
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
      }
      .btn-secondary {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
      }
      footer {
        border-top: 1px solid var(--border);
        padding: 1.2rem 0 2rem;
        color: var(--muted);
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container nav">
        <div class="brand">Bazario Officiel</div>
        <nav class="menu" aria-label="Navigation principale">
          <a href="index.html">Accueil</a>
          <a href="catalogue.html">Catalogue</a>
          <a href="panier.html">Panier</a>
          <a href="checkout.html">Commander</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <section class="card">
        <h1>Votre panier</h1>
        <p>Aucun article persistant n’est encore stocké dans cette version. Vous pouvez continuer directement vers le checkout.</p>
        <div class="actions">
          <a class="btn btn-secondary" href="catalogue.html">Voir le catalogue</a>
          <a class="btn btn-primary" href="checkout.html">Passer à la commande</a>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">© 2026 Bazario Officiel — Tous droits réservés.</div>
    </footer>
  </body>
</html>
