<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bazario Officiel</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 760px;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 5vw, 3rem);
      }
      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
        opacity: 0.92;
      }
      .tag {
        display: inline-block;
        margin-bottom: 1rem;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: #1d4ed8;
        color: #fff;
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="tag">Bazario</span>
      <h1>Bienvenue sur Bazario Officiel</h1>
      <p>
        Le site est maintenant bien connecté à GitHub et Vercel. Tu peux publier tes prochaines mises à jour en
        poussant simplement tes commits.
      </p>
    </main>
  </body>
</html>
