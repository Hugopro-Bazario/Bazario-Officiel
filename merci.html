<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Confirmation de commande Bazario Officiel." />
    <title>Merci | Bazario Officiel</title>
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        --bg: #f8fafc;
        --text: #0f172a;
        --muted: #475569;
        --card: #ffffff;
        --success: #065f46;
        --success-bg: #ecfdf5;
        --primary: #1d4ed8;
        --primary-dark: #1e40af;
        --border: #e2e8f0;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        width: min(820px, calc(100% - 2rem));
        margin: 0 auto;
      }
      header {
        border-bottom: 1px solid var(--border);
        background: #fff;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0;
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      .home {
        color: var(--muted);
        text-decoration: none;
      }
      .home:hover {
        color: var(--text);
      }
      main {
        padding: 2.2rem 0 3rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        padding: 1.25rem;
      }
      .badge {
        display: inline-block;
        background: var(--success-bg);
        color: var(--success);
        padding: 0.35rem 0.6rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 600;
      }
      h1 {
        margin: 0.8rem 0 0.5rem;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .session {
        margin-top: 0.9rem;
        font-size: 0.92rem;
        color: var(--text);
      }
      .actions {
        margin-top: 1.1rem;
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
      }
      .btn {
        text-decoration: none;
        border-radius: 0.6rem;
        padding: 0.65rem 0.9rem;
        font-weight: 600;
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
      }
      .btn-secondary {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
      }
      footer {
        border-top: 1px solid var(--border);
        padding: 1.2rem 0 2rem;
        color: var(--muted);
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container nav">
        <div class="brand">Bazario Officiel</div>
        <a class="home" href="index.html">← Retour à l’accueil</a>
      </div>
    </header>
    <main class="container">
      <section class="card">
        <span class="badge">Paiement confirmé</span>
        <h1>Merci pour votre commande</h1>
        <p>Votre paiement a bien été reçu. Notre équipe vous contactera rapidement pour le suivi.</p>
        <p id="session-line" class="session"></p>
        <div class="actions">
          <a class="btn btn-secondary" href="catalogue.html">Retour au catalogue</a>
          <a class="btn btn-primary" href="checkout.html">Nouvelle commande</a>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">© 2026 Bazario Officiel — Tous droits réservés.</div>
    </footer>
    <script>
      const sessionLine = document.getElementById("session-line");
      const sessionId = new URLSearchParams(window.location.search).get("session_id");
      if (sessionId) {
        sessionLine.textContent = "Référence session Stripe : " + sessionId;
      } else {
        sessionLine.textContent = "Référence session Stripe non fournie.";
      }
    </script>
  </body>
</html>
